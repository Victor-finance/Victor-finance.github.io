# 网站基本信息
title: "Dr. Xingjian Wang"
description: "Professor of Finance specializing in corporate finance and behavioral finance"
url: "https://Victor-finance.github.io"
repository: "Victor-finance/Victor-finance.github.io"

# 作者信息
author:
  name: "Dr. Xingjian Wang"
  avatar: "/images/profile-pic.jpg"
  bio: "Assistant Professor at Capital University of Economics and Business"
  location: "Beijing, China"
  employer: "Assistant Professor"
  email: "your.email@university.edu"
  phone: "+1 (xxx) xxx-xxxx"
  office: "Building Name, Room XXX"
  
  # 学术社交链接
  googlescholar: "https://scholar.google.com/citations?user=YOUR_ID"
  orcid: "https://orcid.org/0000-0000-0000-0000"
  researchgate: "https://www.researchgate.net/profile/YOUR_PROFILE"
  ssrn: "https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=YOUR_ID"
  
  # 社交媒体（可选）
  twitter: "yourtwitterhandle"
  linkedin: "yourlinkedinprofile"
  github: "yourgithubusername"

# Jekyll 设置
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# 插件
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# 集合设置（Academic Pages 核心功能）
collections:
  publications:
    output: true
    permalink: /:collection/:name/
  talks:
    output: true
    permalink: /:collection/:name/
  teaching:
    output: true
    permalink: /:collection/:name/
  portfolio:
    output: true
    permalink: /:collection/:name/

# 默认设置
defaults:
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true
      comments: false
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

# SEO 设置
locale: "en-US"
title_separator: "-"
name: "[Your Name]"
description: "Academic website of Dr. [Your Name], Professor of Finance"
url: "https://Victor-finance.github.io"
baseurl: ""
repository: "Victor-finance/Victor-finance.github.io"
teaser: # path of fallback teaser image
logo: # path of logo image to display in the masthead
masthead_title: # overrides the website title displayed in the masthead

# 社交分享设置
twitter:
  username: "yourtwitterhandle"

facebook:
  username: "yourfacebookusername"
  app_id:
  publisher:

og_image: "/images/profile-pic.jpg"

# Google Analytics
google_site_verification:
google_analytics: # 如果需要的话

# 站点设置
words_per_minute: 200

# 评论设置（可选）
comments:
  provider: false

# 搜索设置
search: true
search_full_content: true
search_provider: lunr

# SEO 和社交设置
social:
  type: Person
  name: "[Your Name]"
  links:
    - "https://twitter.com/yourtwitterhandle"
    - "https://linkedin.com/in/yourlinkedinprofile"
    - "https://scholar.google.com/citations?user=YOUR_ID"

# 排除文件
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
